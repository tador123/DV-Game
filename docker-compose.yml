# ============================================================
# 🧛 DARK SURVIVORS — Docker Compose (Production)
# Run:  docker compose up -d
# Stop: docker compose down
# Logs: docker compose logs -f
# ============================================================

services:
  dark-survivors:
    image: tador2026/dark-survivors:latest
    container_name: dark-survivors
    expose:
      - "3000"
    volumes:
      - game-data:/app/data
    environment:
      - PORT=3000
      - NODE_ENV=production
    restart: unless-stopped
    mem_limit: 450m
    cpus: 0.8

  nginx:
    image: nginx:alpine
    container_name: nginx-proxy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot-etc:/etc/letsencrypt:ro
      - certbot-var:/var/lib/letsencrypt
      - certbot-www:/var/www/certbot
    depends_on:
      - dark-survivors
    restart: unless-stopped
    mem_limit: 64m
    cpus: 0.2

volumes:
  game-data:
    driver: local
  certbot-etc:
    driver: local
  certbot-var:
    driver: local
  certbot-www:
    driver: local
