<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧛 Dark Survivors — Bullet Hell Survival</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: #0a0a12;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            cursor: default;
            user-select: none;
            -webkit-user-select: none;
        }

        canvas {
            display: block;
            position: fixed;
            top: 0;
            left: 0;
        }

        /* HUD Overlay */
        #hud {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            pointer-events: none;
            z-index: 10;
        }

        #xp-bar-container {
            width: 100%;
            height: 8px;
            background: rgba(0,0,0,0.7);
            border-bottom: 1px solid rgba(100,200,255,0.3);
        }

        #xp-bar {
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #00bfff, #00ff88);
            transition: width 0.3s ease;
            box-shadow: 0 0 10px rgba(0,191,255,0.5);
        }

        #stats-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 16px;
            background: rgba(0,0,0,0.5);
        }

        .stat {
            color: #fff;
            font-size: 14px;
            font-weight: 600;
            text-shadow: 0 0 5px rgba(0,0,0,0.8);
            letter-spacing: 0.5px;
        }

        .stat span {
            color: #ffd700;
        }

        #weapon-icons {
            display: flex;
            gap: 6px;
        }

        .weapon-icon {
            width: 36px;
            height: 36px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            position: relative;
        }

        .weapon-icon .wlvl {
            position: absolute;
            bottom: -2px;
            right: -2px;
            background: #ffd700;
            color: #000;
            font-size: 9px;
            font-weight: bold;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* HP Bar */
        #hp-bar-container {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            width: 200px;
            height: 12px;
            background: rgba(0,0,0,0.7);
            border-radius: 6px;
            border: 1px solid rgba(255,50,50,0.5);
            pointer-events: none;
            z-index: 10;
        }

        #hp-bar {
            height: 100%;
            width: 100%;
            background: linear-gradient(90deg, #ff3333, #ff6666);
            border-radius: 5px;
            transition: width 0.2s ease;
        }

        #hp-text {
            position: fixed;
            bottom: 44px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-size: 12px;
            font-weight: bold;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 4px #000;
        }

        /* Upgrade Screen */
        #upgrade-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        #upgrade-screen.active {
            display: flex;
        }

        #upgrade-title {
            color: #ffd700;
            font-size: 36px;
            font-weight: 900;
            margin-bottom: 8px;
            text-shadow: 0 0 20px rgba(255,215,0,0.5);
            letter-spacing: 2px;
        }

        #upgrade-subtitle {
            color: #aaa;
            font-size: 16px;
            margin-bottom: 30px;
        }

        #upgrade-options {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            justify-content: center;
            max-width: 800px;
            padding: 0 20px;
        }

        .upgrade-card {
            width: 220px;
            padding: 24px 16px;
            background: linear-gradient(135deg, rgba(30,30,60,0.95), rgba(20,20,40,0.95));
            border: 2px solid rgba(255,215,0,0.3);
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.2s ease;
            text-align: center;
            pointer-events: all;
        }

        .upgrade-card:hover {
            border-color: #ffd700;
            transform: translateY(-5px) scale(1.03);
            box-shadow: 0 10px 30px rgba(255,215,0,0.2);
        }

        .upgrade-card .icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .upgrade-card .name {
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            margin-bottom: 8px;
        }

        .upgrade-card .desc {
            color: #aaa;
            font-size: 12px;
            line-height: 1.4;
        }

        .upgrade-card .new-badge {
            display: inline-block;
            background: #ff4444;
            color: #fff;
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-bottom: 8px;
            font-weight: bold;
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: radial-gradient(ellipse at center, #1a1a2e 0%, #0a0a12 100%);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            flex-direction: column;
        }

        #start-screen.hidden {
            display: none;
        }

        #game-title {
            font-size: 56px;
            font-weight: 900;
            color: #fff;
            text-shadow: 0 0 30px rgba(255,50,50,0.5), 0 0 60px rgba(255,50,50,0.3);
            margin-bottom: 8px;
            letter-spacing: 3px;
        }

        #game-tagline {
            color: #888;
            font-size: 18px;
            margin-bottom: 50px;
            letter-spacing: 1px;
        }

        #start-btn {
            padding: 16px 60px;
            font-size: 22px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, #ff4444, #cc2222);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            box-shadow: 0 5px 20px rgba(255,50,50,0.4);
        }

        #start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255,50,50,0.6);
        }

        #high-score {
            margin-top: 20px;
            color: #ffd700;
            font-size: 14px;
        }

        #controls-hint {
            margin-top: 30px;
            color: #555;
            font-size: 13px;
        }

        /* Game Over */
        #gameover-screen {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(10,0,0,0.92);
            z-index: 200;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            animation: fadeIn 0.5s ease;
        }

        #gameover-screen.active {
            display: flex;
        }

        #gameover-title {
            font-size: 52px;
            font-weight: 900;
            color: #ff3333;
            text-shadow: 0 0 30px rgba(255,0,0,0.5);
            margin-bottom: 20px;
        }

        #gameover-stats {
            color: #ccc;
            font-size: 18px;
            line-height: 2;
            text-align: center;
            margin-bottom: 30px;
        }

        #gameover-stats span {
            color: #ffd700;
            font-weight: bold;
        }

        #restart-btn {
            padding: 14px 50px;
            font-size: 18px;
            font-weight: 800;
            color: #fff;
            background: linear-gradient(135deg, #ff4444, #cc2222);
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        #restart-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(255,50,50,0.4);
        }

        /* Kill Flash */
        #kill-flash {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            pointer-events: none;
            z-index: 5;
            background: rgba(255,255,255,0);
            transition: background 0.05s ease;
        }

        /* Minimap */
        #minimap {
            position: fixed;
            bottom: 60px;
            right: 16px;
            width: 120px;
            height: 120px;
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 8px;
            background: rgba(0,0,0,0.5);
            pointer-events: none;
            z-index: 10;
        }
    </style>
</head>
<body>
    <canvas id="gameCanvas"></canvas>
    
    <!-- HUD -->
    <div id="hud">
        <div id="xp-bar-container"><div id="xp-bar"></div></div>
        <div id="stats-bar">
            <div class="stat">⏱ <span id="timer">0:00</span></div>
            <div class="stat">Lv. <span id="level">1</span></div>
            <div id="weapon-icons"></div>
            <div class="stat">💀 <span id="kills">0</span></div>
        </div>
    </div>

    <div id="hp-text">HP</div>
    <div id="hp-bar-container"><div id="hp-bar"></div></div>

    <canvas id="minimap"></canvas>
    <div id="kill-flash"></div>

    <!-- Upgrade Screen -->
    <div id="upgrade-screen">
        <div id="upgrade-title">⬆ LEVEL UP!</div>
        <div id="upgrade-subtitle">Choose an upgrade</div>
        <div id="upgrade-options"></div>
    </div>

    <!-- Start Screen -->
    <div id="start-screen">
        <div id="game-title">🧛 DARK SURVIVORS</div>
        <div id="game-tagline">Survive the endless horde. Grow stronger.</div>
        <button id="start-btn">▶ PLAY</button>
        <div id="high-score"></div>
        <div id="controls-hint">WASD or Arrow Keys to move • Everything else is automatic</div>
    </div>

    <!-- Game Over Screen -->
    <div id="gameover-screen">
        <div id="gameover-title">☠ YOU DIED</div>
        <div id="gameover-stats"></div>
        <button id="restart-btn">↻ TRY AGAIN</button>
    </div>

    <script src="game.js"></script>
</body>
</html>
